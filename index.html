<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>كتابة السكربت المجانية</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{min-height:100vh;background:linear-gradient(135deg,#c084fc 0%,#a855f7 30%,#7c3aed 60%,#ec4899 100%);font-family:'Cairo',sans-serif;padding:20px;direction:rtl;}
    .star{position:fixed;width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,0.7);animation:twinkle 3s infinite;}
    @keyframes twinkle{0%,100%{opacity:0.2}50%{opacity:1}}
    @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
    .container{max-width:480px;margin:0 auto;position:relative;z-index:1;}
    .header{text-align:center;margin-bottom:24px;animation:fadeUp 0.5s ease;}
    .header h1{color:white;font-size:26px;font-weight:900;margin-bottom:8px;text-shadow:0 2px 10px rgba(0,0,0,0.2);}
    .header p{color:rgba(255,255,255,0.85);font-size:14px;line-height:1.7;}
    .card{background:rgba(255,255,255,0.15);backdrop-filter:blur(10px);border-radius:20px;padding:20px;border:1px solid rgba(255,255,255,0.25);margin-bottom:16px;animation:fadeUp 0.5s ease;}
    label{color:white;font-weight:700;font-size:15px;display:block;margin-bottom:8px;}
    .field{width:100%;background:rgba(255,255,255,0.92);border:none;border-radius:12px;padding:14px 16px;font-family:'Cairo',sans-serif;font-size:15px;color:#4c1d95;outline:none;direction:rtl;margin-bottom:16px;box-sizing:border-box;}
    textarea.field{resize:none;}
    select.field{cursor:pointer;}
    .btn{width:100%;background:linear-gradient(135deg,#7c3aed,#a855f7);color:white;border:none;border-radius:14px;padding:16px;font-family:'Cairo',sans-serif;font-size:17px;font-weight:700;cursor:pointer;box-shadow:0 4px 20px rgba(124,58,237,0.4);transition:all 0.3s;}
    .btn:hover:not(:disabled){transform:translateY(-2px);}
    .btn:disabled{opacity:0.7;cursor:not-allowed;}
    .spinner{display:inline-block;width:18px;height:18px;border:2px solid white;border-top-color:transparent;border-radius:50%;animation:spin 0.8s linear infinite;vertical-align:middle;margin-left:8px;}
    .error{background:rgba(239,68,68,0.2);border:1px solid rgba(239,68,68,0.5);border-radius:10px;padding:10px;color:white;text-align:center;font-size:14px;margin-bottom:12px;}
    .result-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
    .result-header span{color:white;font-weight:700;font-size:16px;}
    .copy-btn{background:rgba(255,255,255,0.2);border:1px solid rgba(255,255,255,0.4);border-radius:8px;padding:6px 14px;color:white;cursor:pointer;font-family:'Cairo',sans-serif;font-size:13px;font-weight:600;}
    .result-text{background:rgba(255,255,255,0.92);border-radius:12px;padding:16px;color:#4c1d95;font-size:14px;line-height:1.9;white-space:pre-wrap;}
    .footer{text-align:center;}
    .footer p{color:white;font-weight:700;font-size:15px;margin-bottom:12px;}
    .ig-btn{background:linear-gradient(135deg,#f97316,#ec4899,#a855f7);border-radius:12px;padding:12px 20px;color:white;font-weight:700;font-size:15px;cursor:pointer;border:none;width:100%;font-family:'Cairo',sans-serif;}
    .footer small{color:rgba(255,255,255,0.7);font-size:12px;display:block;margin-top:12px;line-height:1.8;}
    #result-card{display:none;}
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>✨ كتابة السكربت المجانية</h1>
    <p>أداة ذكاء اصطناعي احترافية لإنشاء سكربتات فيديوهات قصيرة<br/>(Reels, TikTok, Shorts) جذابة في ثوانٍ</p>
  </div>
  <div class="card">
    <label>💡 موضوع/فكرة الفيديو</label>
    <textarea id="topic" class="field" rows="3" placeholder="اكتب هنا موضوع الفيديو أو فكرته بالتفصيل..."></textarea>
    <label>📱 المنصة</label>
    <select id="platform" class="field">
      <option>Reels</option>
      <option>TikTok</option>
      <option>YouTube Shorts</option>
    </select>
    <label>⏱ مدة الفيديو</label>
    <select id="duration" class="field">
      <option>30 ثانية</option>
      <option>60 ثانية</option>
      <option>90 ثانية</option>
      <option>3 دقائق</option>
    </select>
    <label>📄 نوعية السكربت</label>
    <select id="type" class="field">
      <option>تعليمي</option>
      <option>ترفيهي</option>
      <option>تحفيزي</option>
      <option>إعلاني</option>
      <option>قصصي</option>
      <option>كوميدي</option>
    </select>
    <div id="error" class="error" style="display:none"></div>
    <button class="btn" onclick="generateScript()" id="btn">🪄 إنشاء السكربت ✨</button>
  </div>
  <div class="card" id="result-card">
    <div class="result-header">
      <span>📝 السكربت الجاهز</span>
      <button class="copy-btn" onclick="copyScript()">📋 نسخ</button>
    </div>
    <div class="result-text" id="result-text"></div>
  </div>
  <div class="card footer">
    <p>⭐ تابعيني للمزيد من الأدوات المجانية!</p>
    <button class="ig-btn">→ تابع على Instagram</button>
    <small>✨ تم التطوير بواسطة <strong>إيمان محمد</strong> © 2026<br/>🎁 أداة مجانية 100% لمساعدة صناع المحتوى</small>
  </div>
</div>
<script>
  const API_KEY = "AIzaSyDMrXGExRpwVgRV6OFWeiSo0zOWlB5sqnU";

  for(let i=0;i<20;i++){
    const s=document.createElement('div');
    s.className='star';
    s.style.left=Math.random()*100+'%';
    s.style.top=Math.random()*100+'%';
    s.style.animationDelay=Math.random()*3+'s';
    document.body.appendChild(s);
  }

  async function generateScript(){
    const topic=document.getElementById('topic').value.trim();
    const platform=document.getElementById('platform').value;
    const duration=document.getElementById('duration').value;
    const type=document.getElementById('type').value;
    const btn=document.getElementById('btn');
    const error=document.getElementById('error');
    const resultCard=document.getElementById('result-card');
    const resultText=document.getElementById('result-text');
    if(!topic){error.textContent='⚠️ من فضلك اكتب موضوع الفيديو';error.style.display='block';return;}
    error.style.display='none';
    btn.disabled=true;
    btn.innerHTML='<span class="spinner"></span> جاري الإنشاء...';
    resultCard.style.display='none';
    const prompt=`أنت خبير في كتابة سكربتات فيديوهات ${platform} القصيرة. اكتب سكربت احترافي وجذاب باللغة العربية.\n\nالمعلومات:\n- الموضوع: ${topic}\n- مدة الفيديو: ${duration}\n- نوعية المحتوى: ${type}\n- المنصة: ${platform}\n\nاكتب السكربت:\n🎬 الهوك\n📌 المحتوى الرئيسي\n🔚 الختام مع Call to Action`;
    try{
      const res=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${API_KEY}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({contents:[{parts:[{text:prompt}]}]})});
      const data=await res.json();
      const text=data.candidates?.[0]?.content?.parts?.[0]?.text||'';
      if(!text)throw new Error('لا يوجد رد');
      resultText.textContent=text;
      resultCard.style.display='block';
      resultCard.scrollIntoView({behavior:'smooth'});
    }catch(e){
      error.textContent='❌ '+e.message;
      error.style.display='block';
    }finally{
      btn.disabled=false;
      btn.innerHTML='🪄 إنشاء السكربت ✨';
    }
  }

  function copyScript(){
    navigator.clipboard.writeText(document.getElementById('result-text').textContent);
    const btn=document.querySelector('.copy-btn');
    btn.textContent='✅ تم النسخ!';
    setTimeout(()=>btn.textContent='📋 نسخ',2000);
  }
</script>
</body>
</html>
